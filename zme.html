<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Galaxy Gift</title>
<style>
  body, html {
    margin: 0; padding: 0;
    height: 100%; width: 100%;
    background: black;
    overflow: hidden;
    font-family: Comic Sans MS, sans-serif;
    color: white; text-align: center;
  }
  /* Form 1 */
  #startScreen {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    background: radial-gradient(circle at center, #001133, #000000);
    opacity: 1;
    transition: opacity 2s ease;
  }
  #startScreen.fadeOut { opacity: 0; }
  #heart { font-size: 60px; color: red; cursor: pointer; }
  #loader {
    display: none;
    border: 8px solid #f3f3f3;
    border-top: 8px solid red;
    border-radius: 50%;
    width: 60px; height: 60px;
    animation: spin 1s linear infinite;
    margin-top: 20px;
  }
  @keyframes spin { 0% {transform: rotate(0deg);} 100% {transform: rotate(360deg);} }

  /* Form 2 */
  #screen {
    display: none;
    background: transparent;
    opacity: 0;
    transition: opacity 2s ease;
    z-index: 1;
  }
  #screen.fadeIn { opacity: 1; }
</style>
</head>
<body>
<audio id="audio" loop>
  <source src="nhac.mp3" type="audio/mpeg">
</audio>

<!-- Form 1 -->
<div id="startScreen">
  <div id="heart">❤</div>
  <div id="loader"></div>
  <p>Ấn giữ trái tim để bắt đầu</p>
</div>

<!-- Form 2 -->
<canvas id="screen"></canvas>

<script>
const heart = document.getElementById("heart");
const loader = document.getElementById("loader");
const audio = document.getElementById("audio");
const startScreen = document.getElementById("startScreen");
const canvas = document.getElementById("screen");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let pressTimer;

// Giữ trái tim 1 giây → phát nhạc ngay
heart.addEventListener("mousedown", () => {
  audio.play();
  pressTimer = setTimeout(startLoading, 1000);
});
heart.addEventListener("mouseup", () => clearTimeout(pressTimer));
heart.addEventListener("mouseleave", () => clearTimeout(pressTimer));

heart.addEventListener("touchstart", () => {
  audio.play();
  pressTimer = setTimeout(startLoading, 1000);
});
heart.addEventListener("touchend", () => clearTimeout(pressTimer));

function startLoading() {
  heart.style.display = "none";
  loader.style.display = "block";
  setTimeout(() => {
    startScreen.classList.add("fadeOut");
    setTimeout(() => {
      startScreen.style.display = "none";
      canvas.style.display = "block";
      canvas.classList.add("fadeIn");
      startForm2();
    }, 2000);
  }, 1000);
}

// ---------------- Form 2 ----------------
let WIDTH = canvas.width;
let HEIGHT = canvas.height;
let fallingItems = [];
let lastSpawn = 0;
let stars = [];

const messages = [
  "Honey bunch, you are my everything!",
  "You make my heart smile",
  "I love you so much!",
  "You're amazing",
  "You are my universe",
  "Thank you for being my sunshine",
  "There is no other",
  "Our Anniversary",
  "25/08/2004"
];
const imgSources = ["anh1.jpg","anh2.jpg","anh3.jpg","anh4.jpg"];
const images = [];
imgSources.forEach(src => {
  const img = new Image();
  img.src = src;
  images.push(img);
});

function spawnItem() {
  if (Math.random() < 0.7) {
    const msg = messages[Math.floor(Math.random() * messages.length)];
    fallingItems.push({
      type: "text",
      text: msg,
      x: Math.random() * WIDTH,
      y: -50,
      speed: 1 + Math.random() * 1.5,
      color: "pink"
    });
  } else {
    const img = images[Math.floor(Math.random() * images.length)];
    fallingItems.push({
      type: "image",
      img: img,
      x: Math.random() * WIDTH,
      y: -100,
      speed: 1 + Math.random() * 1.5,
      size: 100 + Math.random() * 50
    });
  }
}

// Tạo sao nền nhiều hơn và có chiều sâu + nhòe
function spawnStars() {
  for (let i=0; i<600; i++) { // nhiều hơn
    stars.push({
      x: Math.random()*WIDTH,
      y: Math.random()*HEIGHT,
      size: Math.random()*2+1,
      alpha: 0.2 + Math.random()*0.3, // sáng nhẹ
      depth: Math.random()*2+0.5 // tạo chiều sâu
    });
  }
}

function loop() {
  WIDTH = canvas.width;
  HEIGHT = canvas.height;
  ctx.clearRect(0,0,WIDTH,HEIGHT);

  // Vẽ sao nền
  stars.forEach(s => {
    ctx.fillStyle = "rgba(255,192,203,"+s.alpha+")";
    ctx.shadowColor = "pink";
    ctx.shadowBlur = 25*s.depth; // nhòe mạnh hơn theo chiều sâu
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size*s.depth, 0, Math.PI*2);
    ctx.fill();
    // di chuyển chậm để tạo chiều sâu
    s.y += 0.02*s.depth;
    if (s.y > HEIGHT) s.y = 0;
  });

  // spawn chữ/ảnh
  if (Date.now() - lastSpawn > 300) {
    for (let i = 0; i < 4; i++) spawnItem();
    lastSpawn = Date.now();
  }

  // Vẽ chữ/ảnh rơi
  ctx.font = "28px Comic Sans MS";
  ctx.textAlign = "center";
  fallingItems.forEach(item => {
    if (item.type === "text") {
      ctx.fillStyle = item.color;
      ctx.shadowColor = "pink";
      ctx.shadowBlur = 20;
      ctx.fillText(item.text, item.x, item.y);
    } else if (item.type === "image" && item.img.complete) {
      ctx.shadowColor = "pink";
      ctx.shadowBlur = 30;
      ctx.drawImage(item.img, item.x - item.size/2, item.y, item.size, item.size);
    }
    item.y += item.speed;
  });
  fallingItems = fallingItems.filter(item => item.y < HEIGHT + 100);

  requestAnimationFrame(loop);
}

function startForm2() {
  spawnStars();
  for (let i = 0; i < 10; i++) spawnItem();
  loop();
}
</script>
</body>
</html>
